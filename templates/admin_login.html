{% extends "base.html" %}

{% block content %}

<section class="admin-login">

<h2>Admin Login</h2>
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</section>

{% endblock %}
